<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#1a1a2e"/>
  <!-- Back card (slightly offset) -->
  <rect x="9" y="7" width="16" height="12" rx="2" fill="#4a73a8" opacity="0.7"/>
  <!-- Front card -->
  <rect x="7" y="10" width="16" height="12" rx="2" fill="white"/>
  <!-- Lines suggesting text on the card -->
  <rect x="10" y="14" width="10" height="2" rx="1" fill="#1a1a2e" opacity="0.35"/>
  <rect x="10" y="18" width="7"  height="2" rx="1" fill="#1a1a2e" opacity="0.2"/>
</svg>
